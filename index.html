<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#030a14">
<title>CITYSPROBLEM</title>
<link rel="icon" type="image/png" href="IMAGES/logo_white.png">
<link rel="apple-touch-icon" href="IMAGES/logo_white.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }

:root {
  --bg: #04060f;
  --text: #e0eaf8;
  --ice: #00d4ff;
  --ice-b: #a78bfa;
  --purple: #7c3aed;
}

html {
  background-color: #030a14;
}
html, body {
  width: 100%; min-height: 100%;
  cursor: none;
  overflow: hidden;
}
body {
  background-color: #030a14;
  color: var(--text);
  font-family: 'Michroma', sans-serif;
  font-weight: 400;
}
.bg-fixed {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1;
  background:
    linear-gradient(to bottom, rgba(4,6,15,.65) 0%, rgba(20,10,40,.45) 50%, rgba(4,6,15,.8) 100%),
    url('IMAGES/PFP.webp') center/cover no-repeat;
  pointer-events: none;
}
a, button, input { cursor: none; }

/* scan lines */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 3px,
    rgba(0,0,0,.12) 3px, rgba(0,0,0,.12) 4px
  );
  pointer-events: none;
  z-index: 10;
}

/* vignette */
.vignette {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.78) 100%);
  pointer-events: none;
  z-index: 8;
}

/* film grain */
.grain {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 9;
  opacity: .055;
  filter: url('#noise');
  background: white;
}

canvas.stars {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* custom cursor */
#cur {
  position: fixed; width: 6px; height: 6px;
  background: var(--ice); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  left: 0; top: 0; margin: -3px 0 0 -3px;
  will-change: transform;
  box-shadow: 0 0 8px var(--ice);
  transition: width .15s, height .15s, margin .15s;
}
#cur-ring {
  position: fixed; width: 28px; height: 28px;
  border: 1px solid rgba(0,212,255,.4); border-radius: 50%;
  pointer-events: none; z-index: 9998;
  left: 0; top: 0; margin: -14px 0 0 -14px;
  will-change: transform;
  transition: width .2s, height .2s, margin .2s, border-color .2s;
}
body.link-hover #cur { width: 12px; height: 12px; margin: -6px 0 0 -6px; }
body.link-hover #cur-ring { width: 42px; height: 42px; margin: -21px 0 0 -21px; border-color: rgba(0,212,255,.7); }

/* layout */
/* topbar */
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 72px; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem;
  background: rgba(4,6,15,.45);
  border-bottom: 1px solid rgba(0,212,255,.12);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}
.topbar-logo {
  height: 36px;
  display: block;
  filter: brightness(0) invert(1) opacity(0.96) sepia(0.03);
}
.topbar-menu-btn {
  display: flex; flex-direction: column; justify-content: center; gap: 5px;
  width: 32px; height: 32px;
  background: none; border: none; padding: 4px;
}
.topbar-menu-btn span {
  display: block; width: 100%; height: 2px;
  background: var(--ice);
  border-radius: 2px;
  transition: opacity .2s, transform .2s;
  box-shadow: 0 0 6px rgba(0,212,255,.5);
}
.topbar-menu-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.topbar-menu-btn.open span:nth-child(2) { opacity: 0; }
.topbar-menu-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.topbar-dropdown {
  position: fixed; top: 72px; right: 0;
  width: 200px; z-index: 199;
  background: rgba(4,6,15,.10);
  border-left: 1px solid rgba(0,212,255,.12);
  border-bottom: 1px solid rgba(0,212,255,.12);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  flex-direction: column; gap: .4rem;
  padding: .5rem;
  display: none;
}
.topbar-dropdown.open {
  display: flex;
  animation: dropDown .2s ease forwards;
}
@keyframes dropDown {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes dropUp {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-6px); }
}
.topbar-dropdown.closing {
  display: flex;
  animation: dropUp .2s ease forwards;
}
.topbar-dropdown button {
  display: inline-flex; align-items: center; justify-content: center;
  width: 100%;
  font-family: 'Michroma', sans-serif;
  font-size: .6rem;
  font-weight: 400;
  letter-spacing: .15em; text-transform: uppercase; white-space: nowrap;
  color: var(--text);
  padding: .6rem .9rem;
  border: none;
  position: relative; overflow: hidden; contain: layout;
  background-color: transparent;
  background-image:
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55)),
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55)),
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55)),
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55)),
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55)),
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55)),
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55)),
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55));
  background-size: 11px 2px, 2px 11px, 11px 2px, 2px 11px, 11px 2px, 2px 11px, 11px 2px, 2px 11px;
  background-position: 0 0, 0 0, 100% 0, 100% 0, 0 100%, 0 100%, 100% 100%, 100% 100%;
  background-repeat: no-repeat;
  transition: color .25s;
}
.topbar-dropdown button:hover {
  color: var(--ice);
  background-image:
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1)),
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1)),
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1)),
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1)),
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1)),
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1)),
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1)),
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1));
}
.topbar-dropdown button::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,.12), transparent);
  transform: skewX(-15deg) translateX(-150%);
  pointer-events: none;
  will-change: transform;
}
.topbar-dropdown button:hover::before { animation: btnSweep .55s ease forwards; }

main {
  position: relative; z-index: 2;
  min-height: 100dvh;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  padding: 72px min(4vw, 3rem) var(--player-h, 56px);
  text-align: center;
}

/* aurora */
.aurora {
  position: absolute;
  width: min(700px, 90vw); height: 300px;
  background: radial-gradient(ellipse at 40% 50%, rgba(0,212,255,.18) 0%, rgba(124,58,237,.12) 50%, transparent 70%);
  filter: blur(48px);
  pointer-events: none;
  will-change: transform, opacity;
  animation: auroraPulse 5s ease-in-out infinite alternate;
}
@keyframes auroraPulse {
  from { opacity: .6; transform: scale(1) translateX(-20px); }
  to   { opacity: 1; transform: scale(1.2) translateX(20px); }
}

h1 {
  font-family: 'Michroma', sans-serif;
  font-weight: 900;
  font-size: clamp(1rem, 5vw, 4rem);
  letter-spacing: .04em; line-height: 1;
  white-space: nowrap;
  text-align: center;
  color: var(--text);
  margin-bottom: clamp(2rem, 5vh, 4rem);
  opacity: 0;
  will-change: opacity, transform;
  text-shadow: none;
  animation: fadeUp .9s .2s ease forwards, glowFadeIn .9s 1.1s ease forwards;
}
@keyframes glowFadeIn {
  from { text-shadow: none; }
  to   { text-shadow: 0 0 18px rgba(0,212,255,.35), 0 0 40px rgba(0,212,255,.15); }
}
@keyframes glowPulse {
  0%, 100% { text-shadow: 0 0 18px rgba(0,212,255,.35), 0 0 40px rgba(0,212,255,.15); }
  50%       { text-shadow: 0 0 28px rgba(0,212,255,.7), 0 0 60px rgba(0,212,255,.3), 0 0 100px rgba(124,58,237,.2); }
}

/* chromatic aberration on h1 hover */
@keyframes chromaAberr {
  0%   { text-shadow: -6px 0 0 rgba(255,0,80,.75), 6px 0 0 rgba(0,212,255,.75); }
  30%  { text-shadow: -4px 0 0 rgba(255,0,80,.5),  4px 0 0 rgba(167,139,250,.5); }
  60%  { text-shadow: -2px 0 0 rgba(255,0,80,.3),  2px 0 0 rgba(0,212,255,.3); }
  100% { text-shadow: 0 0 18px rgba(0,212,255,.35), 0 0 40px rgba(0,212,255,.15); }
}
h1.chroma {
  opacity: 1 !important;
  animation: chromaAberr .5s ease forwards, glowPulse 4s ease-in-out infinite !important;
}

nav {
  display: flex; flex-direction: column;
  align-items: center;
  gap: 1.25rem;
  opacity: 0;
  animation: fadeUp .9s .5s ease forwards;
}

a {
  display: inline-flex; align-items: center; justify-content: center; gap: .75rem;
  width: 260px;
  font-size: clamp(.8rem, 1.6vw, 1rem);
  font-weight: 400;
  letter-spacing: .18em; text-transform: uppercase; white-space: nowrap;
  color: var(--text); text-decoration: none;
  padding: .75rem 1.1rem;
  border: none;
  position: relative;
  overflow: hidden;
  contain: layout;
  background-color: transparent;
  background-image:
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55)),
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55)),
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55)),
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55)),
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55)),
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55)),
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55)),
    linear-gradient(rgba(0,212,255,.55), rgba(0,212,255,.55));
  background-size: 11px 2px, 2px 11px, 11px 2px, 2px 11px, 11px 2px, 2px 11px, 11px 2px, 2px 11px;
  background-position: 0 0, 0 0, 100% 0, 100% 0, 0 100%, 0 100%, 100% 100%, 100% 100%;
  background-repeat: no-repeat;
  transition: color .25s;
}
a:hover {
  color: var(--ice);
  background-image:
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1)),
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1)),
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1)),
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1)),
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1)),
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1)),
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1)),
    linear-gradient(rgba(0,212,255,1), rgba(0,212,255,1));
}
a::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,.12), transparent);
  transform: skewX(-15deg) translateX(-150%);
  pointer-events: none;
  will-change: transform;
}
a:hover::before { animation: btnSweep .55s ease forwards; }
@keyframes btnSweep {
  from { transform: skewX(-15deg) translateX(-150%); }
  to   { transform: skewX(-15deg) translateX(350%); }
}
a .arr { transition: transform .25s; }
a:hover .arr { transform: translateX(3px); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* player */
.player {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  width: 100%;
  display: flex; flex-direction: column; align-items: stretch;
  padding: .85rem 2rem;
  background: rgba(4,6,15,.25);
  border-top: 1px solid rgba(0,212,255,.18);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  z-index: 100;
  opacity: 0;
  animation: fadeUp .9s .7s ease forwards;
}
.player-inner {
  width: var(--player-content-w, 400px);
  margin: 0 auto;
  display: flex; flex-direction: row; align-items: center; gap: .65rem;
}
.player-track-clip {
  overflow: hidden;
  max-width: 14rem;
  flex-shrink: 0;
  display: flex;
  align-items: center;
}
.player-track-name {
  display: inline-block;
  font-size: .65rem; letter-spacing: .2em; color: var(--ice);
  text-transform: uppercase; white-space: nowrap;
}
.player-track-name.scrolling {
  animation: trackScroll 11s ease-in-out infinite;
}
@keyframes trackScroll {
  0%   { transform: translateX(0); }
  15%  { transform: translateX(0); }
  65%  { transform: translateX(var(--scroll-dist, 0px)); }
  85%  { transform: translateX(var(--scroll-dist, 0px)); }
  100% { transform: translateX(0); }
}
.player-time-disp {
  font-size: .55rem; letter-spacing: .1em; color: rgba(200,230,255,.4);
  flex-shrink: 0; user-select: none;
}
.player-progress {
  flex: 1; height: 5px;
  background: rgba(0,212,255,.15);
  cursor: none;
}
.player-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--ice), var(--ice-b));
  box-shadow: 0 0 6px rgba(0,212,255,.5);
}
.player-controls {
  display: flex; align-items: center;
  flex-shrink: 0;
}
.player-btn {
  background: none; border: none;
  font-family: 'Michroma', sans-serif;
  font-size: .85rem; letter-spacing: 0;
  color: rgba(200,230,255,.5);
  display: inline-flex; align-items: center; justify-content: center;
  line-height: 1; padding: 0 .6rem;
  cursor: none; transition: color .2s; user-select: none;
  -webkit-appearance: none; appearance: none;
  -webkit-tap-highlight-color: transparent;
}
.player-btn:hover { color: var(--ice); }
.player-btn-play { color: var(--text); font-size: 1.4rem; width: 2.2rem; height: 1.6rem; position: relative; }
.player-btn-play.playing { color: transparent; text-shadow: none; }
.player-btn-play.playing::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 12px; height: 13px;
  background: linear-gradient(to right,
    var(--ice) 0, var(--ice) 4px,
    transparent 4px, transparent 8px,
    var(--ice) 8px, var(--ice) 12px
  );
  box-shadow: 0 0 8px rgba(0,212,255,.6);
}

.player-volume-row {
  display: flex; align-items: center; gap: .4rem;
  flex-shrink: 0;
}
.player-vol-slider {
  -webkit-appearance: none; appearance: none;
  width: 70px; height: 2px;
  background: rgba(0,212,255,.15);
  outline: none; border: none; cursor: none;
}
.player-vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--ice);
  box-shadow: 0 0 6px rgba(0,212,255,.7);
  cursor: none;
  margin-top: -3px;
}
.player-vol-slider::-moz-range-thumb {
  width: 8px; height: 8px;
  border-radius: 50%; border: none;
  background: var(--ice);
  box-shadow: 0 0 6px rgba(0,212,255,.7);
  cursor: none;
}
.player-vol-slider::-webkit-slider-runnable-track { height: 2px; }
.player-vol-slider::-moz-range-track { height: 2px; background: rgba(0,212,255,.15); }

@media (max-width: 768px) {
  /* no custom cursor on touch devices */
  html, body { cursor: auto; overflow-x: hidden; overflow-y: auto; touch-action: pan-y; overscroll-behavior-x: none; max-width: 100vw; }
  .topbar { background: linear-gradient(to bottom, #030a14 0%, rgba(4,6,15,.45) 100%); }
  #cur, #cur-ring { display: none; }

  main {
    min-height: 100dvh;
    justify-content: center;
    padding: 72px 1.25rem var(--player-h, 48px);
    overflow-y: auto;
  }

  h1 {
    font-size: clamp(1rem, 7vw, 6rem);
    letter-spacing: .02em;
    margin-bottom: clamp(1.2rem, 4vh, 2.5rem);
    width: 100%;
  }

  nav { gap: .75rem; }

  a {
    width: min(88vw, 320px);
    font-size: clamp(.75rem, 3.5vw, .9rem);
    cursor: auto;
  }
  a:hover::before { animation: none; }

  .aurora { width: 100vw; height: 180px; }

  /* player — full width, compact */
  .player { padding: .6rem 1.25rem; }
  .player-inner { width: 100%; }
  .player-volume-row { display: none; }
  .player-counter { display: none; }
  .player-btn-shuffle { cursor: auto; }
  .player-track-clip { max-width: 40vw; }
  .player-track-name {
    font-size: clamp(.35rem, 1.8vw, .55rem);
    text-align: left;
  }
  .player-time-disp { font-size: .5rem; }
  #playerTimeTotal { display: none; }
  .player-btn { cursor: auto; }
  .player-progress {
    cursor: auto;
    position: absolute;
    top: 0; left: 0; right: 0;
    width: 100%; height: 3px;
    flex: none;
  }
  .player-vol-slider { cursor: auto; }
  .player-vol-slider::-webkit-slider-thumb { cursor: auto; }
  .player-vol-slider::-moz-range-thumb { cursor: auto; }
}

/* ── logo glitch on hover ─────────────────────────── */
@keyframes logoGlitch {
  0%,100% { filter: brightness(0) invert(1) opacity(.96) sepia(.03); transform: translate(0,0); }
  15%  { filter: brightness(1.5) invert(.9) hue-rotate(60deg) opacity(1); transform: translate(-3px,0); }
  30%  { filter: brightness(0) invert(1) opacity(.5) saturate(5); transform: translate(3px,0); }
  50%  { filter: brightness(2.5) invert(1) opacity(1); transform: translate(-2px,1px); }
  70%  { filter: brightness(0) invert(1) opacity(.85); transform: translate(1px,-1px); }
}
.topbar-logo:hover { animation: logoGlitch .38s steps(1) forwards; }

/* ── shuffle active state ─────────────────────────── */
.player-btn-shuffle.active { color: var(--ice); text-shadow: 0 0 8px rgba(0,212,255,.5); }

/* ── track counter ────────────────────────────────── */
.player-counter {
  font-size: .5rem; letter-spacing: .1em;
  color: rgba(200,230,255,.3);
  flex-shrink: 0; user-select: none; white-space: nowrap;
}

/* ── bio panel ────────────────────────────────────── */
.bio-backdrop {
  position: fixed; inset: 0; z-index: 299;
  background: rgba(0,0,0,0); pointer-events: none;
  transition: background .35s;
}
.bio-backdrop.active { background: rgba(0,0,0,0); pointer-events: auto; }
.bio-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(440px, 100vw);
  z-index: 300;
  background: rgba(4,6,15,.93);
  border-left: 1px solid rgba(0,212,255,.14);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 5rem 2rem 6rem;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
}
.bio-panel.open { transform: translateX(0); }
.bio-close {
  position: absolute; top: 1.25rem; right: 1.25rem;
  background: none; border: none;
  font-family: 'Michroma', sans-serif;
  font-size: .6rem; letter-spacing: .15em;
  color: rgba(200,230,255,.4); padding: .4rem .6rem;
  transition: color .2s;
}
.bio-close:hover { color: var(--ice); }
.bio-panel-title {
  font-family: 'Michroma', sans-serif;
  font-size: clamp(.85rem, 3vw, 1.3rem);
  letter-spacing: .12em; color: var(--ice);
  margin-bottom: 1.5rem;
  text-shadow: 0 0 18px rgba(0,212,255,.35);
}
.bio-panel-label {
  font-family: 'Michroma', sans-serif;
  font-size: .55rem; letter-spacing: .22em;
  color: rgba(200,230,255,.35);
  margin: 2rem 0 .75rem; text-transform: uppercase;
}
.bio-text {
  font-family: 'Michroma', sans-serif;
  font-size: .7rem; line-height: 2;
  letter-spacing: .05em; color: rgba(200,230,255,.7);
}
.bio-press-links { display: flex; flex-direction: column; gap: .5rem; }
.bio-press-links a {
  width: auto; padding: .5rem .75rem;
  font-size: .58rem; letter-spacing: .13em;
  justify-content: flex-start;
}

/* ── tap-to-play hint ─────────────────────────────── */
.tap-hint {
  position: fixed;
  width: 52px; height: 52px;
  margin: -26px 0 0 -26px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,212,255,.7);
  box-shadow: 0 0 10px rgba(0,212,255,.25);
  pointer-events: none; z-index: 101; opacity: 0;
}
.tap-hint.show { animation: tapPulse 1.8s ease-out infinite; }
@keyframes tapPulse {
  0%   { transform: scale(.8); opacity: .8; }
  100% { transform: scale(2.2); opacity: 0; }
}
</style>
</head>

<script>
/* cursor */
const cur  = document.getElementById('cur');
const ring = document.getElementById('cur-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.transform = `translate(${mx}px,${my}px)`;
});
document.querySelectorAll('a').forEach(a => {
  a.addEventListener('mouseenter', () => document.body.classList.add('link-hover'));
  a.addEventListener('mouseleave', () => document.body.classList.remove('link-hover'));
});

/* film grain — driven by draw loop, no extra timer */
const turbEl = document.querySelector('#noise feTurbulence');
let noiseSeed = 0, grainFrame = 0;

/* scramble */
const glyphSet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@%&<>?';

function scrambleLoop(original, setText, stepMs = 25) {
  let rafId, last = 0;
  function frame(ts) {
    if (ts - last >= stepMs) {
      last = ts;
      setText(original.split('').map(c =>
        c === ' ' ? ' ' : glyphSet[Math.floor(Math.random() * glyphSet.length)]
      ).join(''));
    }
    rafId = requestAnimationFrame(frame);
  }
  rafId = requestAnimationFrame(frame);
  return () => cancelAnimationFrame(rafId);
}

function scrambleResolve(original, setText, steps = 16, stepMs = 25, onComplete) {
  let step = 0, last = 0, rafId;
  function frame(ts) {
    if (ts - last >= stepMs) {
      last = ts;
      setText(original.split('').map((c, i) => {
        if (c === ' ') return ' ';
        if (i < (step / steps) * original.length) return c;
        return glyphSet[Math.floor(Math.random() * glyphSet.length)];
      }).join(''));
      if (++step > steps) { setText(original); onComplete?.(); return; }
    }
    rafId = requestAnimationFrame(frame);
  }
  rafId = requestAnimationFrame(frame);
  return () => cancelAnimationFrame(rafId);
}

/* h1 scramble + chromatic aberration */
const h1El   = document.querySelector('h1');
const h1Orig = 'CITYSPROBLEM';
let cancelH1;
h1El.addEventListener('animationend', e => {
  if (e.animationName === 'glowFadeIn') {
    h1El.style.opacity = '1';
    h1El.style.animation = 'glowPulse 4s ease-in-out infinite';
  }
});
function applyH1Centering() {
  const overflow = h1El.scrollWidth - h1El.clientWidth;
  h1El.style.transform = overflow > 0 ? `translateX(${-(overflow / 2)}px)` : '';
}

h1El.addEventListener('mouseenter', () => {
  h1El.style.width = h1El.offsetWidth + 'px';
  h1El.style.height = h1El.offsetHeight + 'px';
  h1El.style.opacity = '1';
  h1El.style.animation = 'glowPulse 4s ease-in-out infinite';
  cancelH1?.();
  h1El.classList.remove('chroma');
  void h1El.offsetWidth;
  h1El.classList.add('chroma');
  setTimeout(() => h1El.classList.remove('chroma'), 500);
  cancelH1 = scrambleLoop(h1Orig, t => { h1El.textContent = t; applyH1Centering(); });
});
h1El.addEventListener('mouseleave', () => {
  cancelH1?.();
  cancelH1 = scrambleResolve(h1Orig, t => { h1El.textContent = t; applyH1Centering(); }, 16, 25, () => {
    h1El.style.transform = '';
    h1El.style.width = '';
    h1El.style.height = '';
  });
});

/* button scramble */
document.querySelectorAll('nav a').forEach(a => {
  const textNode = [...a.childNodes].find(n => n.nodeType === 3 && n.textContent.trim());
  if (!textNode) return;
  const original = textNode.textContent.trim();
  const span = document.createElement('span');
  span.style.display = 'inline-block';
  span.textContent = original;
  textNode.replaceWith(span);
  requestAnimationFrame(() => { span.style.minWidth = span.offsetWidth + 'px'; });
  let cancelBtn;
  a.addEventListener('mouseenter', () => {
    cancelBtn?.();
    cancelBtn = scrambleLoop(original, t => { span.textContent = t; });
  });
  a.addEventListener('mouseleave', () => {
    cancelBtn?.();
    cancelBtn = scrambleResolve(original, t => { span.textContent = t; });
  });
});

/* audio player — tracks sourced from SONGS/tracks.js */
const audio       = document.getElementById('audio');
const playerTrack       = document.getElementById('playerTrack');
const playerTimeCurrent = document.getElementById('playerTimeCurrent');
const playerTimeTotal   = document.getElementById('playerTimeTotal');
const playerFill  = document.getElementById('playerFill');
const playerProg  = document.getElementById('playerProgress');
const btnPlay     = document.getElementById('btnPlay');
const btnPrev     = document.getElementById('btnPrev');
const btnNext     = document.getElementById('btnNext');
const btnShuffle  = document.getElementById('btnShuffle');
const playerCounter = document.getElementById('playerCounter');

let shuffleOn = false;
function nextTrackIdx() {
  if (!shuffleOn) return trackIdx + 1;
  let r;
  do { r = Math.floor(Math.random() * tracks.length); } while (tracks.length > 1 && r === trackIdx);
  return r;
}
function updateCounter() {
  playerCounter.textContent = tracks.length ? `${trackIdx + 1} / ${tracks.length}` : '—';
}

const tracks = (window.TRACKS || []).map(t => ({
  title: t.title.toUpperCase(),
  url: 'SONGS/' + t.file,
}));
let trackIdx = 0;

function fmt(t) {
  return `${Math.floor(t/60)}:${Math.floor(t%60).toString().padStart(2,'0')}`;
}

function updateMarquee() {
  const clip = playerTrack.parentElement;
  const overflow = playerTrack.scrollWidth - clip.clientWidth;
  if (overflow > 2) {
    playerTrack.style.setProperty('--scroll-dist', `-${overflow}px`);
    playerTrack.classList.add('scrolling');
  } else {
    playerTrack.classList.remove('scrolling');
  }
}

function loadTrack(idx) {
  if (!tracks.length) return;
  trackIdx = ((idx % tracks.length) + tracks.length) % tracks.length;
  audio.src = tracks[trackIdx].url;
  const title = tracks[trackIdx].title;
  playerTrack.classList.remove('scrolling');
  scrambleResolve(title, t => { playerTrack.textContent = t; }, 16, 25, () => {
    updateMarquee();
  });
  updateCounter();
  if (!audio.paused) audio.play();
}

function setPlaying(v) {
  btnPlay.textContent = v ? '' : '▶\uFE0E';
  btnPlay.classList.toggle('playing', v);
}

if (tracks.length) loadTrack(0);
else { playerTrack.textContent = '—'; updateCounter(); }

btnPlay.addEventListener('click', () => {
  hideTapHint();
  if (!tracks.length) return;
  audio.paused ? audio.play() : audio.pause();
});
btnPrev.addEventListener('click', () => loadTrack(trackIdx - 1));
btnNext.addEventListener('click', () => loadTrack(nextTrackIdx()));
audio.addEventListener('play',  () => setPlaying(true));
audio.addEventListener('pause', () => setPlaying(false));
audio.addEventListener('ended', () => {
  if (shuffleOn || trackIdx < tracks.length - 1) loadTrack(nextTrackIdx());
  else setPlaying(false);
});
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  playerFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
  playerTimeCurrent.textContent = fmt(audio.currentTime);
  playerTimeTotal.textContent   = fmt(audio.duration);
});
function seekTo(clientX) {
  if (!audio.duration) return;
  const r = playerProg.getBoundingClientRect();
  const pct = Math.min(1, Math.max(0, (clientX - r.left) / r.width));
  audio.currentTime = pct * audio.duration;
  playerFill.style.width = (pct * 100) + '%';
}
let isSeeking = false;
let wasPlaying = false;
playerProg.addEventListener('mousedown', e => {
  isSeeking = true;
  wasPlaying = !audio.paused;
  audio.pause();
  seekTo(e.clientX);
});
playerProg.addEventListener('touchstart', e => {
  isSeeking = true;
  wasPlaying = !audio.paused;
  audio.pause();
  seekTo(e.touches[0].clientX);
}, { passive: true });
window.addEventListener('mousemove', e => { if (isSeeking) seekTo(e.clientX); });
window.addEventListener('touchmove', e => { if (isSeeking) { e.preventDefault(); seekTo(e.touches[0].clientX); } }, { passive: false });
window.addEventListener('mouseup',  () => { if (isSeeking) { isSeeking = false; if (wasPlaying) audio.play(); } });
window.addEventListener('touchend', () => { if (isSeeking) { isSeeking = false; if (wasPlaying) audio.play(); } });

/* block horizontal swipe on mobile */
let _txStart = 0, _tyStart = 0;
document.addEventListener('touchstart', e => { _txStart = e.touches[0].clientX; _tyStart = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchmove', e => {
  if (isSeeking) return; // already handled by seek listener
  const dx = Math.abs(e.touches[0].clientX - _txStart);
  const dy = Math.abs(e.touches[0].clientY - _tyStart);
  if (dx > dy) e.preventDefault();
}, { passive: false });

/* volume slider */
const volSlider = document.getElementById('volSlider');
function updateVolTrack() {
  const pct = volSlider.value * 100;
  volSlider.style.background = `linear-gradient(90deg, var(--ice) ${pct}%, rgba(0,212,255,.15) ${pct}%)`;
}
volSlider.addEventListener('input', () => {
  audio.volume = volSlider.value;
  updateVolTrack();
});
updateVolTrack();

/* sync player width to h1 */
const playerEl   = document.getElementById('player');
function syncPlayerWidth() {
  const w = window.innerWidth <= 768
    ? playerEl.offsetWidth
    : h1El.offsetWidth;
  playerEl.style.setProperty('--player-content-w', w + 'px');
  document.documentElement.style.setProperty('--player-h', playerEl.offsetHeight + 'px');
}
document.fonts.ready.then(syncPlayerWidth);
let resizePlayerTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizePlayerTimer);
  resizePlayerTimer = setTimeout(syncPlayerWidth, 100);
});

/* cursor hover for player controls */
[btnPlay, btnPrev, btnNext, btnShuffle, playerProg, volSlider].forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('link-hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('link-hover'));
});

/* topbar menu */
const menuBtn      = document.getElementById('menuBtn');
const menuDropdown = document.getElementById('menuDropdown');
function closeMenu() {
  if (!menuDropdown.classList.contains('open')) return;
  menuDropdown.classList.add('closing');
  menuBtn.classList.remove('open');
  setTimeout(() => { menuDropdown.classList.remove('open', 'closing'); }, 200);
}
menuBtn.addEventListener('click', () => {
  menuDropdown.classList.contains('open') ? closeMenu() : (menuDropdown.classList.add('open'), menuBtn.classList.add('open'));
});
document.addEventListener('click', e => {
  if (!menuBtn.contains(e.target) && !menuDropdown.contains(e.target)) closeMenu();
});
[menuBtn, ...menuDropdown.querySelectorAll('button')].forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('link-hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('link-hover'));
});

/* dropdown nav links */
const menuLinks = {
  menuInstagram: 'https://www.instagram.com/itsthecitysproblemnow',
  menuSpotify:   'https://open.spotify.com/artist/672iTns9P1RuXRG0AcIhcn?si=rjl7Ou1SQx6BWd0GUQiVQg',
  menuSoundcloud:'https://soundcloud.com/citysproblem',
  menuBandcamp:  'https://itsthecitysproblemnow.bandcamp.com/',
  menuYoutube:   'https://www.youtube.com/@citysproblem',
  menuContact:   'mailto:dj@citysproblem.com',
};
Object.entries(menuLinks).forEach(([id, url]) => {
  document.getElementById(id).addEventListener('click', () => {
    closeMenu();
    window.open(url, url.startsWith('mailto') ? '_self' : '_blank');
  });
});

/* bio panel */
const bioPanel    = document.getElementById('bioPanel');
const bioBackdrop = document.getElementById('bioBackdrop');
const bioClose    = document.getElementById('bioClose');
const menuBioBtn  = document.getElementById('menuBioBtn');
function openBio()  { bioPanel.classList.add('open'); bioBackdrop.classList.add('active'); closeMenu(); }
function closeBio() { bioPanel.classList.remove('open'); bioBackdrop.classList.remove('active'); }
menuBioBtn.addEventListener('click', openBio);
bioClose.addEventListener('click', closeBio);
bioBackdrop.addEventListener('click', closeBio);
[bioClose, menuBioBtn].forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('link-hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('link-hover'));
});

/* shuffle button */
btnShuffle.addEventListener('click', () => {
  shuffleOn = !shuffleOn;
  btnShuffle.classList.toggle('active', shuffleOn);
});

/* logo hover cursor */
document.querySelector('.topbar-logo').addEventListener('mouseenter', () => document.body.classList.add('link-hover'));
document.querySelector('.topbar-logo').addEventListener('mouseleave', () => document.body.classList.remove('link-hover'));

/* tap-to-play hint */
function showTapHint() {
  if (!('ontouchstart' in window)) return;
  if (localStorage.getItem('cpPlayHintSeen')) return;
  const hint = document.getElementById('tapHint');
  const r = btnPlay.getBoundingClientRect();
  hint.style.left = (r.left + r.width / 2) + 'px';
  hint.style.top  = (r.top  + r.height / 2) + 'px';
  hint.classList.add('show');
}
function hideTapHint() {
  document.getElementById('tapHint').classList.remove('show');
  localStorage.setItem('cpPlayHintSeen', '1');
}
setTimeout(showTapHint, 2200);

/* star field + shooting stars */
const sc  = document.getElementById('stars');
const ctx = sc.getContext('2d');
const dpr = window.devicePixelRatio || 1;

const stars = Array.from({ length: 180 }, () => {
  const purple = Math.random() > 0.85;
  return {
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.4 + 0.2,
    speed: Math.random() * 0.00015 + 0.00003,
    base: Math.random() * 0.6 + 0.2,
    twinkle: Math.random() * Math.PI * 2,
    ts: Math.random() * 0.015 + 0.004,
    fill: purple ? 'rgb(180,140,255)' : 'rgb(200,230,255)',
  };
});

const shoots = [];

function resizeSC() {
  sc.width  = innerWidth  * dpr;
  sc.height = innerHeight * dpr;
  ctx.scale(dpr, dpr);
}
resizeSC();
let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resizeSC, 150); });

(function drawStars() {
  /* cursor ring spring — merged into single rAF loop */
  rx += (mx - rx) * .25; ry += (my - ry) * .25;
  ring.style.transform = `translate(${rx}px,${ry}px)`;

  const W = innerWidth, H = innerHeight;
  ctx.clearRect(0, 0, W, H);

  /* stars — alpha bucket batching (180 draws → ~20-30) */
  const buckets = new Map();
  stars.forEach(s => {
    s.twinkle += s.ts;
    s.y -= s.speed;
    if (s.y < 0) { s.y = 1; s.x = Math.random(); }
    const alpha = Math.round(s.base * (0.5 + 0.5 * Math.sin(s.twinkle)) * 20) / 20;
    const key = s.fill + alpha;
    let b = buckets.get(key);
    if (!b) { b = { alpha, fill: s.fill, list: [] }; buckets.set(key, b); }
    b.list.push(s);
  });
  for (const { alpha, fill, list } of buckets.values()) {
    ctx.globalAlpha = alpha;
    ctx.fillStyle = fill;
    ctx.beginPath();
    list.forEach(s => {
      ctx.moveTo(s.x * W + s.r, s.y * H);
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    });
    ctx.fill();
  }

  /* sync grain to draw loop every 6 frames */
  if (++grainFrame % 6 === 0)
    turbEl.setAttribute('seed', (noiseSeed = (noiseSeed + 1) % 200));

  /* shooting stars */
  if (Math.random() < 0.004) {
    shoots.push({
      x: Math.random() * W * 0.8,
      y: Math.random() * H * 0.3,
      len: Math.random() * 90 + 60,
      spd: Math.random() * 9 + 7,
      ang: Math.PI / 4 + (Math.random() - 0.5) * 0.25,
      life: 1,
    });
  }
  for (let i = shoots.length - 1; i >= 0; i--) {
    const s = shoots[i];
    s.x   += Math.cos(s.ang) * s.spd;
    s.y   += Math.sin(s.ang) * s.spd;
    s.life -= 0.025;
    if (s.life <= 0 || s.x > W || s.y > H) { shoots.splice(i, 1); continue; }
    ctx.globalAlpha = s.life;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - Math.cos(s.ang) * s.len, s.y - Math.sin(s.ang) * s.len);
    ctx.strokeStyle = 'rgb(220,240,255)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
  requestAnimationFrame(drawStars);
})();
</script>
